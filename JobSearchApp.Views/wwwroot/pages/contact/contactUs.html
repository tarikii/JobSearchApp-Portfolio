<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Contactanos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <div id="navbar"></div>

    <div class="container">
        <div class="row">
            <div class="col-2"></div>
            <div class="col-8 mt-5">
                <h1>Contacto</h1>
                <form>
                    <div class="form-group">
                        <input type="email" class="form-control" placeholder="Correo"><br />
                    </div>
                    <div class="form-group">
                        <input type="text" class="form-control" placeholder="Asunto"><br />
                    </div>
                    <div class="form-group">
                        <textarea placeholder="Descripcion" class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
                    </div><br />
                    <button type="submit" class="btn btn-primary">Submit</button>
                </form>
            </div>
            <div class="col-2"></div>
        </div>
    </div>

    <script>
        fetch('/pages/components/navbarLoggedComponent.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navbar').innerHTML = data;
            });
    </script>
</body>
</html>
