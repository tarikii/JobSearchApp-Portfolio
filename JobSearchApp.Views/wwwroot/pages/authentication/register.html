<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Swipe4Work</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="stylesheet" href="../../css/register/register.css">
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-6 p-0">
                <!-- Remove padding from the columns -->
                <div class="container-form">
                    <h1 id="title-form">Registro</h1>
                    <form class="validate-form">
                        <div class="name-label">
                            <label for="name" class="form-label">Nombre</label>
                        </div>
                        <div class="name-input">
                            <input type="text" id="name" class="validate-input" />
                            <span class="error-message"></span>
                        </div>
                        <div class="lastname-label">
                            <label for="lastname" class="form-label">Apellido</label>
                        </div>
                        <div class="lastname-input">
                            <input type="text" id="lastname" class="validate-input" />
                            <span class="error-message"></span>
                        </div>
                        <div class="username-label">
                            <label for="username" class="form-label">Nombre de usuario</label>
                        </div>
                        <div class="username-input">
                            <input type="text" id="username" class="validate-input" />
                            <span class="error-message"></span>
                        </div>
                        <div class="email-label">
                            <label for="email" class="form-label">Correo</label>
                        </div>
                        <div class="email-input">
                            <input type="email" id="email" class="validate-input" />
                            <span class="error-message"></span>
                        </div>
                        <div class="password-label">
                            <label for="password" class="form-label">Contraseña</label>
                        </div>
                        <div class="password-input">
                            <input type="password" id="password" class="validate-input" />
                            <span class="error-message"></span>
                        </div>
                        <div class="confirm-label">
                            <label for="confirm" class="form-label">Confirmar contraseña</label>
                        </div>
                        <div class="confirm-input">
                            <input type="password" id="confirm-password" class="validate-input" />
                            <span class="error-message"></span>
                        </div>
                        <div class="submit-button">
                            <button type="submit" id="registerBtn">Registrarse</button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="col-md-6 p-0">
                <!-- Remove padding from the columns -->
                <div class="welcome-container">
                    <div class="welcome-content">
                        <h1>Bienvenido a Swipe4Work</h1>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../../js/validation.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../../js/user/register.js"></script>
</body>
</html>
