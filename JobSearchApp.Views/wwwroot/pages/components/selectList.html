<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Select List Components</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>

    <!-- Agregar Bootstrap CSS desde CDN -->
    <!--    <link href="../../css/components/selectList.css" rel="stylesheet">-->

</head>
<body>
<div class="input-group mb-3">
    <div class="input-group-prepend">
        <label class="input-group-text" for="inputGroupSelect01">Pregunta</label>
    </div>
    <select class="custom-select" id="inputGroupSelect01">
        <option selected>Elige...</option>
    </select>
</div>

<div class="input-group mb-3">
    <div class="input-group-prepend">
        <span class="input-group-text">Respuesta</span>
    </div>
    <input type="text" class="form-control" aria-label="Amount (to the nearest dollar)">
    <div class="input-group-append">
        <button class="btn btn-outline-secondary" type="button">Editar</button>
        <button class="btn btn-outline-secondary" type="button">Enviar</button>
    </div>
</div>

<script src="../../js/components/selectList.js" defer></script>
</body>
</html>
